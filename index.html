<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHEIN TRACE | Dashboard</title>
    <!-- 1. Tailwind for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 2. React Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 3. Helper for Charts (This was likely the missing piece!) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <!-- 4. Babel to make it run in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        #root:empty::before { content: "Loading Dashboard... Please wait."; padding: 20px; display: block; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = Recharts;

        // --- Mock Data ---
        const supplierData = [
            { name: 'Grade A', value: 45, color: '#000000' },
            { name: 'Grade B', value: 33, color: '#3b82f6' },
            { name: 'Grade C', value: 15, color: '#f59e0b' },
            { name: 'Failed', value: 7, color: '#ef4444' },
        ];

        const carbonData = [
            { year: '2021', emissions: 18.2, target: 20.0 },
            { year: '2022', emissions: 21.5, target: 19.5 },
            { year: '2023', emissions: 24.8, target: 18.0 },
            { year: '2024', emissions: 26.2, target: 16.5 },
        ];

        const Dashboard = () => {
            const [view, setView] = useState('Executive');

            return (
                <div className="min-h-screen pb-10">
                    <nav className="bg-white border-b px-6 py-4 mb-8">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <span className="bg-black text-white px-3 py-1 font-black italic text-lg">SHEIN</span>
                                <span className="text-blue-600 font-bold underline text-lg">TRACE</span>
                            </div>
                            <button 
                                onClick={() => setView(view === 'Executive' ? 'Consumer' : 'Executive')}
                                className="bg-black text-white px-5 py-2 rounded-full text-xs font-bold hover:bg-gray-800 transition"
                            >
                                SWITCH TO {view === 'Executive' ? 'CONSUMER' : 'EXECUTIVE'} VIEW
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto px-6">
                        <div className="mb-10">
                            <h1 className="text-4xl font-black">{view} Insight</h1>
                            <p className="text-gray-500 font-medium italic mt-2">Live ESG Compliance & Supply Chain Transparency Tracking.</p>
                        </div>

                        {/* Top Stats */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                            <div className="bg-white p-6 rounded-3xl border shadow-sm">
                                <p className="text-xs font-bold text-gray-400 uppercase tracking-widest">Supplier Audits</p>
                                <h2 className="text-4xl font-black mt-2">78.4%</h2>
                                <p className="text-green-500 font-bold text-sm mt-3">↑ +12% improvement</p>
                            </div>
                            <div className="bg-white p-6 rounded-3xl border shadow-sm">
                                <p className="text-xs font-bold text-gray-400 uppercase tracking-widest">Carbon Impact</p>
                                <h2 className="text-4xl font-black mt-2">26.2M</h2>
                                <p className="text-red-500 font-bold text-sm mt-3">⚠ Critical Rise</p>
                            </div>
                            <div className="bg-white p-6 rounded-3xl border shadow-sm">
                                <p className="text-xs font-bold text-gray-400 uppercase tracking-widest">Regulatory Status</p>
                                <h2 className="text-4xl font-black mt-2 text-orange-500">PENDING</h2>
                                <p className="text-gray-400 font-bold text-sm mt-3">EU Audit Oct 2024</p>
                            </div>
                        </div>

                        {/* Charts Area */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                            <div className="bg-white p-8 rounded-3xl border shadow-sm">
                                <h3 className="text-xl font-black mb-6">Emissions Growth vs 2030 Target</h3>
                                <div style={{ width: '100%', height: 300 }}>
                                    <ResponsiveContainer>
                                        <LineChart data={carbonData}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f0f0f0" />
                                            <XAxis dataKey="year" axisLine={false} tickLine={false} />
                                            <YAxis axisLine={false} tickLine={false} />
                                            <Tooltip />
                                            <Line type="monotone" dataKey="emissions" stroke="#ef4444" strokeWidth={4} name="Actual mtCO2" />
                                            <Line type="dashed" dataKey="target" stroke="#10b981" strokeDasharray="5 5" name="Target" />
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>

                            <div className="bg-white p-8 rounded-3xl border shadow-sm">
                                <h3 className="text-xl font-black mb-6">Supplier ESG Rating (Internal)</h3>
                                <div style={{ width: '100%', height: 300 }}>
                                    <ResponsiveContainer>
                                        <BarChart data={supplierData}>
                                            <XAxis dataKey="name" axisLine={false} tickLine={false} />
                                            <YAxis hide />
                                            <Tooltip cursor={{fill: '#f9fafb'}} />
                                            <Bar dataKey="value" radius={[10, 10, 0, 0]}>
                                                {supplierData.map((entry, index) => (
                                                    <Cell key={`cell-${index}`} fill={entry.color} />
                                                ))}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
