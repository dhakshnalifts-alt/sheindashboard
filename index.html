<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHEIN TRACE | Transparency Dashboard</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel (to run code in browser) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Recharts for Data Viz -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = Recharts;

        // Data
        const supplierData = [
            { name: 'Grade A', value: 45, color: '#000000' },
            { name: 'Grade B', value: 33, color: '#3b82f6' },
            { name: 'Grade C', value: 15, color: '#f59e0b' },
            { name: 'Failed', value: 7, color: '#ef4444' },
        ];

        const carbonData = [
            { year: '2021', emissions: 18.2, target: 20.0 },
            { year: '2022', emissions: 21.5, target: 19.5 },
            { year: '2023', emissions: 24.8, target: 18.0 },
            { year: '2024', emissions: 26.2, target: 16.5 },
        ];

        const Dashboard = () => {
            const [view, setView] = useState('Executive');

            return (
                <div className="min-h-screen pb-20">
                    <nav className="bg-white border-b p-4 mb-8">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <span className="bg-black text-white px-2 py-1 font-black italic">SHEIN</span>
                                <span className="text-blue-600 font-bold underline">TRACE</span>
                            </div>
                            <button 
                                onClick={() => setView(view === 'Executive' ? 'Consumer' : 'Executive')}
                                class="bg-gray-100 px-4 py-2 rounded-full text-xs font-bold hover:bg-gray-200"
                            >
                                SWITCH TO {view === 'Executive' ? 'CONSUMER' : 'EXECUTIVE'} VIEW
                            </button>
                        </div>
                    </nav>

                    <div className="max-w-6xl mx-auto px-4">
                        <h1 className="text-3xl font-black mb-2">{view} ESG Pulse</h1>
                        <p className="text-gray-500 mb-8 italic">Real-time transparency tracking for Shein Global Operations.</p>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border">
                                <p className="text-xs font-bold text-gray-400 uppercase">Suppliers Audited</p>
                                <h2 className="text-3xl font-black">78.4%</h2>
                                <p className="text-green-500 text-sm font-bold mt-2">▲ +12% vs 2023</p>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border">
                                <p className="text-xs font-bold text-gray-400 uppercase">Carbon Footprint</p>
                                <h2 className="text-3xl font-black">26.2M mt</h2>
                                <p className="text-red-500 text-sm font-bold mt-2">▼ +13% (Warning)</p>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border">
                                <p className="text-xs font-bold text-gray-400 uppercase">Compliance Risk</p>
                                <h2 className="text-3xl font-black">{view === 'Executive' ? 'CRITICAL' : 'IMPROVING'}</h2>
                                <p className="text-gray-400 text-sm mt-2">Next Audit: Oct 2024</p>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <div className="bg-white p-6 rounded-2xl border shadow-sm">
                                <h3 className="font-bold mb-4">Emissions vs 2030 Target</h3>
                                <div style={{ width: '100%', height: 300 }}>
                                    <ResponsiveContainer>
                                        <LineChart data={carbonData}>
                                            <CartesianGrid strokeDasharray="3 3" />
                                            <XAxis dataKey="year" />
                                            <YAxis />
                                            <Tooltip />
                                            <Line type="monotone" dataKey="emissions" stroke="#ef4444" strokeWidth={3} />
                                            <Line type="dashed" dataKey="target" stroke="#10b981" />
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-2xl border shadow-sm">
                                <h3 className="font-bold mb-4">Supplier ESG Grades</h3>
                                <div style={{ width: '100%', height: 300 }}>
                                    <ResponsiveContainer>
                                        <BarChart data={supplierData}>
                                            <XAxis dataKey="name" />
                                            <YAxis />
                                            <Tooltip cursor={{fill: 'transparent'}} />
                                            <Bar dataKey="value">
                                                {supplierData.map((entry, index) => (
                                                    <Cell key={`cell-${index}`} fill={entry.color} />
                                                ))}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>

                        {view === 'Executive' && (
                            <div className="mt-10 bg-black text-white p-6 rounded-2xl flex justify-between items-center">
                                <div>
                                    <h4 className="font-bold">⚠️ Regulatory Alert</h4>
                                    <p className="text-gray-400 text-sm">EU Ecodesign Directive compliance audit due in 45 days.</p>
                                </div>
                                <button className="bg-white text-black px-6 py-2 rounded-full font-bold text-sm">Review Policy</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
